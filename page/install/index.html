<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Install Vishnupur SMR (Sitamarhi) App </title>

  <meta name="description"
    content="Install the official Vishnupur SMR App to access village information, community updates, development projects, public services, announcements, and local resources of Vishnupur, Sitamarhi, Bihar.">

  <meta name="keywords"
    content="Vishnupur, Vishnupur Sitamarhi, Vishnupur Bihar, Vishnupur SMR, Village Portal, Gram Panchayat, Sitamarhi Village, Bihar Village, Community Updates, Public Services, Village Information">

  <meta name="author" content="Haproven">

  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Install Vishnupur SMR App">
  <meta property="og:description"
    content="Official digital platform of Vishnupur, Sitamarhi, Bihar. Install the app for village updates, announcements, services, and community information.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vishnupursmr.netlify.app/page/install/index.html">
  <meta property="og:image" content="/assets/img/vishnupursmr-logo.webp">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Install Vishnupur SMR App">
  <meta name="twitter:description"
    content="Official Vishnupur village app for community updates, services, and announcements.">

  <meta name="theme-color" content="#182848">

  <link rel="canonical" href="https://vishnupursmr.netlify.app/page/install/index.html">

  <link rel="manifest" href="/manifest.json">


  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/assets/img/vishnupursmr-icon.webp">
  <link rel="shortcut icon" href="/assets/img/vishnupursmr-icon.webp">

  <!-- Apple Devices -->
  <link rel="apple-touch-icon" href="/assets/img/vishnupursmr-icon.webp">


  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: rgba(0, 0, 0, .3);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      background: #00e676;
      font-size: 16px;
      cursor: pointer;
    }

    .info-box {
      position: fixed;
      display: grid;
      text-align: center;

      top: 90%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .info-box h2 {
      margin: 0;
    }


    /* Mobile */
    @media (max-width: 768px) {
      .info-box {
        width: 90%;
        top: auto;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>


  <main>


    <section class="box">
      <h1>📲 Install Vishnupur SMR App</h1>
      <p>Vishnupur की सेवाएं और अपडेट अपने मोबाइल पर प्राप्त करें।</p>
      <button id="installBtn">Install App </button>
    </section>


    <section class="info-box">
      <h2>ऐप इंस्टॉल क्यों करें?</h2>

      <p>
        Vishnupur SMR ऐप के माध्यम से आपको महत्वपूर्ण सूचनाएँ, नई घोषणाएँ,
        उपयोगी लिंक और स्थानीय जानकारी एक ही स्थान पर मिलेगी। होम स्क्रीन से
        सीधे ऐप खोलें और नवीनतम अपडेट प्राप्त करें।
      </p>
    </section>


  </main>



  <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    };
  </script>

</body>

</html>
